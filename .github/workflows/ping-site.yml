name: Ping site every 10 min

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Debug ping
        run: |
          echo "Testing site..."
          curl -I -L -v https://form.aerowebai.com || true
          echo ""
          echo "HTTP status:"
          curl -L -o /dev/null -s -w "%{http_code}\n" https://form.aerowebai.com || true
